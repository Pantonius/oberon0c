workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE =~ /^(\[Draft\]|\(Draft\)|Draft:)/
      when: never

default:
  image: alpine
  before_script:
    - apk add build-base clang clang-dev llvm llvm-dev llvm-static llvm-test-utils llvm-gtest clang-extra-tools cmake extra-cmake-modules autoconf automake make pkgconf curl-dev boost-dev catch2-3

build:test:
  stage: build
  variables:
    FF_USE_FASTZIP: "1"
    ARTIFACT_COMPRESSION_LEVEL: "slowest"
  script:
    - cmake -B build
    - cmake --build build -t oberon0c_tests
  artifacts:
    paths:
      - build/oberon0c_tests
      - build/oberon0c_tests*.cmake
      - build/CTestTestfile.cmake    
  cache:
    paths:
      - build/

build:release:
  stage: build
  script:
    - cmake -B build
    - cmake -- build build -t oberon0c
  cache:
    paths:
      - build/
  artifacts:
    paths:
      - build/oberon0c

# run tests using the binary built before
test:
  stage: test
  needs: ["build:test"]
  script:
    - ctest --test-dir build
