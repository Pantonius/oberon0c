# use the official gcc image, based on debian
# can use versions as well, like gcc:5.2
# see https://hub.docker.com/_/gcc/
default:
  image: alpine
  before_script:
    - apk add build-base clang clang-dev llvm llvm-dev llvm-static llvm-test-utils llvm-gtest clang-extra-tools cmake extra-cmake-modules autoconf automake make pkgconf curl-dev boost-dev catch2-3
    - cmake -B build

build:
  stage: build
  script:
    - cmake --build build
  artifacts:
    paths:
      - build/oberon0c
      - build/oberon0c_tests
      
  cache:
    paths:
      - build/

# run tests using the binary built before
test:
  stage: test
  script:
    - ctest --test-dir build
